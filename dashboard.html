<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Trophy Raid Control</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
--bg:#0b0f19;--sf:#111827;--sf2:#1a2332;--sf3:#0f1520;--bd:#1f2b3d;--bdl:#2a3a52;
--tx:#e0e6ef;--tx2:#8a99b0;--tx3:#5a6a80;
--acc:#ff6b2b;--acc2:#ff8f5a;--grn:#22c55e;--grn2:#22c55e30;--red:#ef4444;--red2:#ef444430;
--blu:#3b82f6;--amb:#f59e0b;--pur:#a855f7;--cyn:#06b6d4;--pink:#ec4899;
--glow:0 0 20px rgba(255,107,43,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;outline:none}
input,select{font-family:inherit;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:8px 10px;font-size:12px;width:100%}
input:focus,select:focus{border-color:var(--acc);outline:none;box-shadow:0 0 0 2px rgba(255,107,43,.15)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}::-webkit-scrollbar-track{background:transparent}

/* === LAYOUT === */
.layout{display:grid;grid-template-columns:280px 1fr 300px;grid-template-rows:50px 1fr;height:100vh;gap:1px;background:var(--bd)}
.layout>*{background:var(--bg)}

/* === HEADER === */
.hdr{grid-column:1/-1;background:var(--sf);display:flex;align-items:center;padding:0 16px;gap:16px}
.hdr-logo{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px;color:var(--acc);display:flex;align-items:center;gap:8px}
.hdr-logo svg{width:28px;height:28px}
.hdr-sep{width:1px;height:28px;background:var(--bd)}
.hdr-time{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:22px;color:var(--tx);letter-spacing:2px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.hdr-stat{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2)}
.hdr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hdr-dot.on{background:var(--grn);box-shadow:0 0 8px var(--grn)}
.hdr-dot.off{background:var(--red);box-shadow:0 0 8px var(--red)}
.hdr-badge{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--tx)}

/* === LEFT PANEL === */
.left{display:flex;flex-direction:column;overflow:hidden;background:var(--sf3)}
.panel-head{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.panel-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px}
.panel-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.filter-row{padding:0 14px 8px;display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.filter-btn{font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid var(--bd);color:var(--tx3);font-weight:500;transition:all .15s}
.filter-btn.act{border-color:currentColor;color:var(--tx);background:var(--sf2)}
.crew-list{flex:1;overflow-y:auto;padding:0 8px 8px}

.crew-card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;margin-bottom:5px;cursor:pointer;transition:all .15s;position:relative;display:flex;gap:8px}
.crew-card:hover{border-color:var(--bdl);background:var(--sf2)}
.crew-card.sel{border-color:var(--acc);box-shadow:var(--glow)}
.crew-card.sos{border-color:var(--red);animation:sosPulse 1.5s infinite}
@keyframes sosPulse{50%{background:var(--red2)}}
.cc-bar{width:3px;border-radius:3px;flex-shrink:0;align-self:stretch}
.cc-body{flex:1;min-width:0}
.cc-top{display:flex;justify-content:space-between;align-items:center}
.cc-num{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px}
.cc-age{font-size:10px;font-weight:600}
.cc-name{font-size:10px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cc-meta{display:flex;gap:6px;margin-top:4px;font-size:9px;flex-wrap:wrap}
.cc-tag{padding:1px 6px;border-radius:3px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx2)}
.age-g{color:var(--grn)}.age-y{color:var(--amb)}.age-r{color:var(--red)}

/* === MAP === */
.map-wrap{position:relative;overflow:hidden}
#map{width:100%;height:100%}
.leaflet-container{background:var(--bg)!important}
.leaflet-control-zoom a{background:var(--sf)!important;color:var(--tx)!important;border:1px solid var(--bd)!important;width:32px!important;height:32px!important;line-height:30px!important;font-size:16px!important}
.ntip{background:var(--sf)!important;border:1px solid var(--bdl)!important;color:var(--tx)!important;font-family:'Chakra Petch'!important;font-weight:700!important;font-size:12px!important;padding:2px 7px!important;border-radius:4px!important;box-shadow:0 2px 8px rgba(0,0,0,.5)!important}
.ntip::before{border-top-color:var(--bdl)!important}
.cp-icon{background:none!important;border:none!important}
.cpm{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch';font-weight:700;font-size:9px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.5)}
.map-tools{position:absolute;top:10px;right:10px;z-index:400;display:flex;flex-direction:column;gap:4px}
.mt-btn{width:36px;height:36px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:14px;font-weight:700;transition:all .15s}
.mt-btn:hover{background:var(--sf2);color:var(--tx)}.mt-btn.act{background:var(--acc);color:#fff;border-color:var(--acc)}
/* Follow mode indicator */
.follow-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:400;background:var(--acc);color:#fff;padding:4px 14px;border-radius:16px;font-size:11px;font-weight:600;display:none;cursor:pointer;font-family:'Chakra Petch'}
.follow-badge.show{display:block}

/* === RIGHT PANEL === */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--sf3)}
.right-tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.rt-btn{flex:1;padding:10px 0;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid transparent;transition:all .15s}
.rt-btn:hover{color:var(--tx2)}.rt-btn.act{color:var(--acc);border-bottom-color:var(--acc)}
.right-body{flex:1;overflow-y:auto;padding:10px}
.right-pane{display:none}.right-pane.act{display:block}

/* Log */
.log-entry{padding:6px 0;border-bottom:1px solid var(--bd);font-size:10px;display:flex;gap:8px;align-items:flex-start}
.log-time{color:var(--tx3);flex-shrink:0;width:50px}
.log-type{width:28px;text-align:center;border-radius:3px;font-weight:700;font-size:9px;padding:1px 0;flex-shrink:0}
.log-rx{background:var(--blu);color:#fff}.log-cp{background:var(--grn);color:#fff}.log-err{background:var(--red);color:#fff}.log-sys{background:var(--sf2);color:var(--tx2)}
.log-msg{color:var(--tx2);flex:1}

/* Detail card */
.det-card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:10px}
.det-num{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:24px;text-align:center}
.det-sub{font-size:11px;color:var(--tx2);text-align:center;margin-top:2px}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:10px}
.det-cell{background:var(--sf2);border-radius:4px;padding:6px;text-align:center}
.det-cell .k{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.det-cell .v{font-size:14px;font-weight:700;margin-top:1px}
.det-actions{display:flex;gap:4px;margin-top:8px}
.det-actions button{flex:1;padding:7px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.btn-acc{background:var(--acc);color:#fff}.btn-out{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}

/* Settings */
.set-block{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:10px}
.set-block h3{font-family:'Chakra Petch';font-size:11px;color:var(--tx2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px}
.set-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cat-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;padding:5px 0;border-bottom:1px solid var(--bd)}
.cat-row:last-child{border-bottom:none}

/* Modals */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center}
.mbg.show{display:flex}
.mdl{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mdl h2{font-family:'Chakra Petch';font-size:15px;color:var(--acc);margin-bottom:14px;font-weight:700}
.fg{margin-bottom:8px}.fg label{display:block;font-size:10px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{padding:10px;border-radius:6px;font-weight:700;font-size:11px;width:100%;text-transform:uppercase;letter-spacing:.5px}
.btn-a{background:var(--acc);color:#fff}.btn-r{background:var(--red);color:#fff}.btn-o{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}

.gpx-preview{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:6px;margin:6px 0;max-height:160px;overflow-y:auto;font-size:10px}
.gpx-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bd);color:var(--tx2)}
.gpx-row:last-child{border-bottom:none}

/* Tile download */
.tile-progress{height:4px;background:var(--sf2);border-radius:2px;margin-top:6px;overflow:hidden}
.tile-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}

/* Responsive: collapse to mobile */
@media(max-width:900px){
.layout{grid-template-columns:1fr;grid-template-rows:50px 1fr}
#pnl-left,#pnl-right{position:fixed;top:50px;bottom:0;width:85%;max-width:320px;background:var(--bg);z-index:1000;transform:translateX(-100%);transition:transform .25s}
#pnl-right{right:0;left:auto;transform:translateX(100%)}
#pnl-left.open{transform:translateX(0)}
#pnl-right.open{transform:translateX(0)}
.mob-nav{display:flex!important;grid-column:1/-1;background:var(--sf);border-top:1px solid var(--bd)}
.mob-nav button{flex:1;padding:8px 0 6px;font-size:9px;color:var(--tx3);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600;text-transform:uppercase}
.mob-nav button.act{color:var(--acc)}
.mob-nav svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
}
@media(min-width:901px){.mob-nav{display:none!important}}
</style>
</head>
<body>
<div class="layout">
<div class="hdr"><div class="hdr-logo"><svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/><path d="M16 6l3 8h8l-6.5 5 2.5 8L16 21l-7 6 2.5-8L5 14h8z" fill="currentColor" opacity=".3" stroke="currentColor" stroke-width="1.5"/></svg>Trophy Raid</div><div class="hdr-sep"></div><div class="hdr-time" id="clk">--:--:--</div><div class="hdr-right"><div class="hdr-stat"><div class="hdr-dot" id="led"></div><span id="gw-st">Нет связи</span></div><div class="hdr-badge" id="node-cnt">0 узлов</div><div class="hdr-badge" id="poll-cnt">#0</div></div></div>

<div class="left" id="pnl-left"><div class="panel-head"><span class="panel-title">Экипажи</span><button class="panel-badge" onclick="openPF()">+ Добавить</button></div><div class="filter-row" id="cat-filters"></div><div class="crew-list" id="crew-list"></div></div>

<div class="map-wrap"><div id="map"></div><div class="map-tools"><button class="mt-btn" onclick="fitAll()" title="Все узлы">⊞</button><button class="mt-btn" id="btn-heat" onclick="toggleHeat()" title="Тепловая карта">H</button><button class="mt-btn act" id="btn-trail" onclick="toggleTrails()" title="Треки">T</button></div><div class="follow-badge" id="follow-badge" onclick="stopFollow()">Слежение: <span id="follow-name">---</span> ✕</div></div>

<div class="right" id="pnl-right"><div class="right-tabs"><button class="rt-btn act" onclick="rTab('detail')" id="rt-det">Детали</button><button class="rt-btn" onclick="rTab('log')" id="rt-log">Журнал</button><button class="rt-btn" onclick="rTab('cp')" id="rt-cp">Точки</button><button class="rt-btn" onclick="rTab('set')" id="rt-set">Настройки</button></div><div class="right-body"><div class="right-pane act" id="rp-detail"><div style="padding:20px;text-align:center;color:var(--tx3);font-size:11px">Выберите экипаж<br>в списке или на карте</div></div><div class="right-pane" id="rp-log"><div id="log-list"></div></div><div class="right-pane" id="rp-cp"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;color:var(--tx2)">Контрольные точки</span><span><button class="panel-badge" onclick="openCF()">+</button><button class="panel-badge" style="background:var(--blu);margin-left:4px" onclick="document.getElementById('gpxf').click()">GPX</button><input type="file" id="gpxf" accept=".gpx" style="display:none" onchange="loadGPX(event)"></span></div><div id="cp-list"></div></div><div class="right-pane" id="rp-set"></div></div></div>

<div class="mob-nav" style="display:none"><button onclick="mTab('map')" id="mt-map" class="act"><svg viewBox="0 0 24 24"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg>Карта</button><button onclick="mTab('left')" id="mt-left"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Экипажи</button><button onclick="mTab('right')" id="mt-right"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 01-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 01-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 01-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 010-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 012.8-2.8l.1.1c.5.5 1.2.7 1.8.3a1.7 1.7 0 001-1.5V3a2 2 0 014 0v.1c0 .6.4 1.2 1 1.5a1.7 1.7 0 001.8-.3l.1-.1a2 2 0 012.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8c.3.6.9 1 1.5 1H21a2 2 0 010 4h-.1c-.6 0-1.2.4-1.5 1z"/></svg>Панель</button></div>
</div>

<div class="mbg" id="m-p"><div class="mdl"><h2 id="mp-t">Экипаж</h2><input type="hidden" id="mp-i" value="-1"><div class="fr"><div class="fg"><label>ID устройства</label><input id="mp-dev" type="number"></div><div class="fg"><label>Стартовый №</label><input id="mp-num" type="number"></div></div><div class="fr"><div class="fg"><label>Пилот</label><input id="mp-pil"></div><div class="fg"><label>Штурман</label><input id="mp-nav"></div></div><div class="fg"><label>Автомобиль</label><input id="mp-car"></div><div class="fg"><label>Категория</label><select id="mp-cat"></select></div><div class="fr" style="margin-top:12px;gap:8px"><button class="btn btn-a" onclick="saveP()">Сохранить</button><button class="btn btn-o" onclick="closeM('m-p')">Отмена</button></div><div id="mp-del" style="margin-top:8px;display:none"><button class="btn btn-r" onclick="delP()">Удалить</button></div></div></div>

<div class="mbg" id="m-c"><div class="mdl"><h2 id="mc-t">Точка</h2><input type="hidden" id="mc-id" value=""><div class="fr"><div class="fg"><label>Название</label><input id="mc-name"></div><div class="fg"><label>Радиус (м)</label><input id="mc-rad" type="number" value="50"></div></div><div class="fr"><div class="fg"><label>Широта</label><input id="mc-lat"></div><div class="fg"><label>Долгота</label><input id="mc-lon"></div></div><div class="fg"><label>Тип</label><select id="mc-type"><option value="cp">КТ</option><option value="base">Базовый лагерь</option><option value="start">Старт</option><option value="finish">Финиш</option></select></div><div class="fg"><label>Категории</label><div id="mc-cats"></div></div><div style="font-size:10px;color:var(--tx3);margin:4px 0">Клик по карте = координаты</div><div class="fr" style="margin-top:8px;gap:8px"><button class="btn btn-a" onclick="saveC()">Сохранить</button><button class="btn btn-o" onclick="closeM('m-c')">Отмена</button></div><div id="mc-del" style="margin-top:8px;display:none"><button class="btn btn-r" onclick="delC()">Удалить</button></div></div></div>

<div class="mbg" id="m-gpx"><div class="mdl"><h2>Импорт GPX</h2><div style="font-size:11px;color:var(--tx2);margin-bottom:6px">Точек: <b id="gpx-cnt">0</b></div><div class="fg"><label>Радиус (м)</label><input id="gpx-rad" type="number" value="50"></div><div class="fg"><label>Категории</label><div id="gpx-cats"></div></div><div class="gpx-preview" id="gpx-list"></div><div class="fr" style="margin-top:8px;gap:8px"><button class="btn btn-a" onclick="gpxGo()">Импорт</button><button class="btn btn-o" onclick="closeM('m-gpx')">Отмена</button></div></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
var $=function(i){return document.getElementById(i)},
F=function(p){return fetch(p).then(function(r){return r.json()})},
P=function(p,d){return fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){return r.json()})},
DD=function(p){return fetch(p,{method:'DELETE'}).then(function(r){return r.json()})};

var COL=['#ff6b2b','#3b82f6','#22c55e','#ef4444','#a855f7','#06b6d4','#f59e0b','#ec4899','#14b8a6','#f97316','#8b5cf6','#10b981','#e11d48','#0ea5e9','#d946ef','#84cc16','#f43f5e','#06b6d4','#eab308','#6366f1'];
function nc(i){return COL[i%COL.length]}

var nodes=[],parts=[],cats=[],cps=[],logs=[];
var mks={},trailLns={},cpMks={},cpCirs={},trackCache={};
var heatLayer=null,heatOn=false,trailsOn=true;
var pN=0,selDev=null,followDev=null,activeCat='all';
var mapFitted=false;

function catBy(id){return cats.find(function(c){return c.id===id})}
function partBy(d){return parts.find(function(p){return p.dev_id==d})}
function cpCatIds(cp){return Array.isArray(cp&&cp.cat_ids)?cp.cat_ids:[]}
function cpRadius(cp){var r=+(cp&&cp.radius);return isNaN(r)||r<=0?50:r}
function cpColor(cp){var ids=cpCatIds(cp);if(!ids.length)return'#f59e0b';if(cp.cp_type==='base')return'#ef4444';var c=catBy(ids[0]);return c?c.color:'#f59e0b'}

var map=L.map('map',{zoomControl:false,attributionControl:false}).setView([49.45,11.08],13);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('/tiles/{z}/{x}/{y}.png',{maxZoom:18,errorTileUrl:'https://tile.openstreetmap.org/{z}/{x}/{y}.png'}).addTo(map);
map.on('click',function(e){if($('m-c').classList.contains('show')){$('mc-lat').value=e.latlng.lat.toFixed(7);$('mc-lon').value=e.latlng.lng.toFixed(7)}});

var ws=null,wsRetry=null,pollTimer=null;
function applyNodes(n,src,pollCount){nodes=n||[];pN=(typeof pollCount==='number'?pollCount:(pN+1));$('led').className='hdr-dot on';$('gw-st').textContent=src==='ws'?'WebSocket':'Подключено';$('node-cnt').textContent=nodes.length+' узл';$('poll-cnt').textContent='#'+pN;updMap();rCrews();if(selDev!==null)rDet(selDev);if(followDev!==null){var fn=nodes.find(function(x){return x.id==followDev});if(fn)map.panTo([fn.lat,fn.lon])}}
function poll(){F('/api/nodes').then(function(n){applyNodes(n,'poll')}).catch(function(){$('led').className='hdr-dot off';$('gw-st').textContent='Нет связи'})}
function startPolling(){if(pollTimer)return;poll();pollTimer=setInterval(poll,3000)}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null}}
function connectWS(){try{var proto=(location.protocol==='https:'?'wss://':'ws://');ws=new WebSocket(proto+location.host+'/ws');ws.onopen=function(){$('gw-st').textContent='WebSocket';stopPolling()};ws.onmessage=function(ev){try{var m=JSON.parse(ev.data);if(m&&m.type==='nodes')applyNodes(m.nodes,'ws',m.poll_count)}catch(_){}};ws.onclose=function(){$('led').className='hdr-dot off';$('gw-st').textContent='Нет связи (WS)';startPolling();if(wsRetry)clearTimeout(wsRetry);wsRetry=setTimeout(function(){connectWS()},1500)};ws.onerror=function(){}}catch(_){startPolling()}}
function loadMeta(){Promise.all([F('/api/participants'),F('/api/categories'),F('/api/checkpoints')]).then(function(r){parts=r[0];cats=r[1];cps=r[2];drawCPs();if(!mapFitted&&cps.length>0){map.fitBounds(L.latLngBounds(cps.map(function(cp){return[cp.lat,cp.lon]})),{padding:[40,40]});mapFitted=true}rCatFilters();rCPlist();rCats()}).catch(function(){})}
setInterval(loadMeta,15000);setTimeout(function(){loadMeta();startPolling();connectWS()},300);

function addLog(type,msg){logs.unshift({time:new Date().toLocaleTimeString().substring(0,8),type:type,msg:msg});if(logs.length>100)logs.length=100;rLog()}
function updMap(){var hp=[];nodes.forEach(function(n){if(activeCat!=='all'){var p=partBy(n.id);if(p&&p.cat_id!==activeCat)return;if(!p&&activeCat!=='unreg')return}var k=n.id,ll=[n.lat,n.lon],col=nc(k),p=partBy(k),label=p?'#'+p.num:'#'+k;var age=n.age/1000,op=age>120?.3:age>60?.55:1;if(!mks[k]){mks[k]=L.circleMarker(ll,{radius:7,fillColor:col,fillOpacity:op,color:k===selDev?'#fff':'rgba(255,255,255,.5)',weight:k===selDev?3:1.5,opacity:op}).addTo(map);mks[k].bindTooltip(label,{permanent:true,direction:'top',offset:[0,-10],className:'ntip'});mks[k].on('click',function(){selectNode(n.id)})}else{mks[k].setLatLng(ll);mks[k].setStyle({fillOpacity:op,opacity:op,weight:k===selDev?3:1.5,color:k===selDev?'#fff':'rgba(255,255,255,.5)'})}hp.push([n.lat,n.lon,.7])});if(heatOn){Object.keys(trackCache).forEach(function(k){var tr=trackCache[k];if(!tr)return;for(var i=0;i<tr.length;i+=4)hp.push([tr[i].lat,tr[i].lon,.25])});if(heatLayer)map.removeLayer(heatLayer);heatLayer=L.heatLayer(hp,{radius:16,blur:18,maxZoom:17,gradient:{0.2:'#3b82f6',0.4:'#22c55e',0.6:'#f59e0b',0.8:'#ff6b2b',1:'#ef4444'}}).addTo(map)}}
function loadTrack(d){F('/api/tracks/'+d+'?limit=3000').then(function(tr){trackCache[d]=tr;if(trailLns[d]){map.removeLayer(trailLns[d]);delete trailLns[d]}if(tr&&tr.length&&(trailsOn||d==selDev)){var col=nc(d);trailLns[d]=L.polyline(tr.map(function(p){return[p.lat,p.lon]}),{color:col,weight:d==selDev?3.5:2,opacity:d==selDev?.8:.4}).addTo(map)}}).catch(function(){})}
setInterval(function(){nodes.forEach(function(n){loadTrack(n.id)})},30000);

function drawCPs(){Object.values(cpMks).forEach(function(m){map.removeLayer(m)});Object.keys(cpCirs).forEach(function(k){if(Array.isArray(cpCirs[k]))cpCirs[k].forEach(function(c){map.removeLayer(c)})});cpMks={};cpCirs={};cps.forEach(function(cp){var ids=cpCatIds(cp);if(activeCat!=='all'&&ids.indexOf(activeCat)===-1)return;var col=cpColor(cp),isB=cp.cp_type==='base';var cols=[];ids.forEach(function(cid){var cat=cats.find(function(x){return x.id==cid});if(!cat)return;cols.push(cat.color)});if(!cols.length)cols=[col];var bg=cols.length>1?'background:conic-gradient('+cols.map(function(c,i){var s=360/cols.length;return c+' '+(i*s)+'deg '+(i*s+s)+'deg'}).join(',')+')':'background:'+col;var icon=L.divIcon({className:'cp-icon',html:'<div class="cpm" style="'+bg+(isB?';width:26px;height:26px':'')+'">'+(cp.name||'CP').replace(/[^A-Za-z0-9\u0410-\u044f\u0451\u0401]/g,'').substring(0,3)+'</div>',iconSize:[22,22],iconAnchor:[11,11]});cpMks[cp.id]=L.marker([cp.lat,cp.lon],{icon:icon}).addTo(map);cpMks[cp.id].bindPopup('<b>'+(cp.name||'CP')+'</b><br>Тип: '+cp.cp_type+'<br>Радиус: '+cpRadius(cp)+' м');cpMks[cp.id].on('click',function(){editCP(cp.id)});cpCirs[cp.id]=[];cols.forEach(function(c,ci){cpCirs[cp.id].push(L.circle([cp.lat,cp.lon],{radius:cpRadius(cp)+(ci*2),color:c,fillColor:c,fillOpacity:.06,weight:1.5,dashArray:'6 4'}).addTo(map))})})}

function fitAll(){var pts=[];nodes.forEach(function(n){pts.push([n.lat,n.lon])});cps.forEach(function(cp){pts.push([cp.lat,cp.lon])});if(!pts.length)return;map.fitBounds(L.latLngBounds(pts),{padding:[40,40]})}
function toggleHeat(){heatOn=!heatOn;$('btn-heat').classList.toggle('act',heatOn);if(!heatOn&&heatLayer){map.removeLayer(heatLayer);heatLayer=null}else updMap()}
function toggleTrails(){trailsOn=!trailsOn;$('btn-trail').classList.toggle('act',trailsOn);Object.keys(trailLns).forEach(function(k){map.removeLayer(trailLns[k]);delete trailLns[k]});if(trailsOn||selDev!==null)nodes.forEach(function(n){loadTrack(n.id)})}
function selectNode(id){if(selDev!==null&&!trailsOn&&trailLns[selDev]){map.removeLayer(trailLns[selDev]);delete trailLns[selDev]}selDev=id;rDet(id);rCrews();loadTrack(id);Object.keys(mks).forEach(function(k){var isSel=parseInt(k)===id;mks[k].setStyle({weight:isSel?3:1.5,color:isSel?'#fff':'rgba(255,255,255,.5)'})});rTab('detail');addLog('sys','Выбран #'+(partBy(id)?partBy(id).num:id))}
function startFollow(id){followDev=id;var p=partBy(id);$('follow-name').textContent=p?'#'+p.num:'#'+id;$('follow-badge').classList.add('show');addLog('sys','Слежение: #'+(p?p.num:id))}
function stopFollow(){followDev=null;$('follow-badge').classList.remove('show')}

function rCatFilters(){var h='<button class="filter-btn'+(activeCat==='all'?' act':'')+'" onclick="setCatFilter(\'all\')">Все</button>';cats.forEach(function(c){h+='<button class="filter-btn'+(activeCat===c.id?' act':'')+'" style="'+(activeCat===c.id?'color:'+c.color+';border-color:'+c.color:'')+'" onclick="setCatFilter(\''+c.id+'\')">'+c.name+'</button>'});$('cat-filters').innerHTML=h}
function setCatFilter(id){activeCat=id;rCatFilters();rCrews();drawCPs();updMap()}

function rCrews(){var el=$('crew-list'),h='';var sorted=parts.slice().sort(function(a,b){return a.num-b.num});sorted.forEach(function(p){if(activeCat!=='all'&&p.cat_id!==activeCat)return;var n=nodes.find(function(x){return x.id==p.dev_id}),col=nc(p.dev_id);var age=n?Math.floor(n.age/1000):null,ageStr=age===null?'—':age<60?age+'c':Math.floor(age/60)+'m',ageCls=age===null?'age-r':age>120?'age-r':age>60?'age-y':'age-g';var isSel=selDev===p.dev_id,sos=n&&(n.flags&1);h+='<div class="crew-card'+(isSel?' sel':'')+(sos?' sos':'')+'" onclick="selectNode('+p.dev_id+')"><div class="cc-bar" style="background:'+col+'"></div><div class="cc-body"><div class="cc-top"><span class="cc-num" style="color:'+col+'">#'+p.num+'</span><span class="cc-age '+ageCls+'">'+ageStr+'</span></div><div class="cc-name">'+p.pilot+(p.navigator?' / '+p.navigator:'')+'</div>';if(n){h+='<div class="cc-meta"><span class="cc-tag" style="color:var(--blu)">'+n.speed+' km/h</span><span class="cc-tag" style="color:var(--pur)">'+n.alt+'m</span><span class="cc-tag" style="color:'+(n.battery<20?'var(--red)':'var(--grn)')+'">'+n.battery+'%</span><span class="cc-tag" style="color:var(--cyn)">'+(n.rssi||0)+' dBm</span></div>'}h+='</div></div>'});nodes.forEach(function(n){if(partBy(n.id))return;if(activeCat!=='all'&&activeCat!=='unreg')return;h+='<div class="crew-card'+(selDev===n.id?' sel':'')+'" onclick="selectNode('+n.id+')"><div class="cc-bar" style="background:'+nc(n.id)+'"></div><div class="cc-body"><div class="cc-top"><span class="cc-num" style="color:'+nc(n.id)+'">DEV#'+n.id+'</span><span class="cc-age age-y">?</span></div><div class="cc-name" style="color:var(--amb)">Не зарегистрирован</div></div></div>'});if(!h)h='<div style="padding:20px;text-align:center;color:var(--tx3);font-size:11px">Нет экипажей</div>';el.innerHTML=h}

function rDet(d){var el=$('rp-detail'),n=nodes.find(function(x){return x.id==d}),p=partBy(d),col=nc(d),cat=p?catBy(p.cat_id):null;var h='<div class="det-card"><div class="det-num" style="color:'+col+'">'+(p?'#'+p.num:'DEV#'+d)+'</div>';if(p){h+='<div class="det-sub">'+p.pilot+(p.navigator?' / '+p.navigator:'')+'</div><div class="det-sub" style="font-size:10px">'+p.car+(cat?' · <span style="color:'+cat.color+'">'+cat.name+'</span>':'')+'</div>'}h+='</div>';if(n){var dirs=['С','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'],dir=dirs[Math.round((n.heading||0)/45)%8];h+='<div class="det-grid"><div class="det-cell"><div class="k">Широта</div><div class="v" style="color:var(--grn)">'+n.lat.toFixed(6)+'</div></div><div class="det-cell"><div class="k">Долгота</div><div class="v" style="color:var(--grn)">'+n.lon.toFixed(6)+'</div></div><div class="det-cell"><div class="k">Скорость</div><div class="v" style="color:var(--blu)">'+n.speed+'</div></div><div class="det-cell"><div class="k">Курс</div><div class="v" style="color:var(--amb)">'+(n.heading||0)+'° '+dir+'</div></div><div class="det-cell"><div class="k">Высота</div><div class="v" style="color:var(--pur)">'+n.alt+'m</div></div><div class="det-cell"><div class="k">HDOP</div><div class="v" style="color:var(--cyn)">'+(n.hdop||0).toFixed(1)+'</div></div><div class="det-cell"><div class="k">Батарея</div><div class="v" style="color:'+(n.battery<20?'var(--red)':'var(--grn)')+'">'+n.battery+'%</div></div><div class="det-cell"><div class="k">RSSI</div><div class="v" style="color:var(--cyn)">'+(n.rssi||0)+' dBm</div></div><div class="det-cell"><div class="k">Давность</div><div class="v">'+Math.floor(n.age/1000)+'с</div></div></div>'}else h+='<div style="padding:16px;text-align:center;color:var(--tx3);font-size:11px">Нет данных</div>';h+='<div class="det-actions"><button class="btn-acc" onclick="map.setView(['+((n&&n.lat)||0)+','+ ((n&&n.lon)||0)+'],16)">Найти</button><button class="btn-acc" onclick="startFollow('+d+')">Следить</button>'+(p?'<button class="btn-out" onclick="editP('+d+')">Изменить</button>':'<button class="btn-acc" onclick="openPF('+d+')">Регистрация</button>')+'</div><button class="btn btn-o" style="margin-top:6px;font-size:10px" onclick="window.open(\'/api/tracks/'+d+'/gpx\')">Скачать трек GPX</button>';el.innerHTML=h}

function rTab(t){document.querySelectorAll('.right-pane').forEach(function(p){p.classList.remove('act')});$('rp-'+t).classList.add('act');document.querySelectorAll('.rt-btn').forEach(function(b){b.classList.remove('act')});$('rt-'+t).classList.add('act');if(t==='cp')rCPlist();if(t==='set')rSet();if(t==='log')rLog()}
function rLog(){var h='';logs.forEach(function(l){var tc=l.type==='rx'?'log-rx':l.type==='cp'?'log-cp':l.type==='err'?'log-err':'log-sys';h+='<div class="log-entry"><span class="log-time">'+l.time+'</span><span class="log-type '+tc+'">'+l.type.toUpperCase()+'</span><span class="log-msg">'+l.msg+'</span></div>'});if(!h)h='<div style="padding:16px;text-align:center;color:var(--tx3);font-size:11px">Пусто</div>';$('log-list').innerHTML=h}
function rCPlist(){var h='';cps.forEach(function(cp){var col=cpColor(cp),ids=cpCatIds(cp),catN='';ids.forEach(function(cid){var cat=cats.find(function(x){return x.id==cid});if(!cat)return;catN+='<span style="color:'+cat.color+'">'+cat.name+'</span> '});catN=catN.trim();h+='<div class="set-block" style="padding:8px 10px;margin-bottom:4px;display:flex;align-items:center;gap:8px"><div style="width:24px;height:24px;border-radius:50%;background:'+col+';display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;flex-shrink:0">'+(cp.name||'CP').substring(0,2)+'</div><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600">'+(cp.name||'CP')+'</div><div style="font-size:9px;color:var(--tx3)">'+cp.lat.toFixed(5)+', '+cp.lon.toFixed(5)+' · r='+cpRadius(cp)+'м'+(catN?' · '+catN:'')+'</div></div><button style="color:var(--blu);font-size:14px" onclick="editCP(\''+cp.id+'\')">✎</button><button style="color:var(--red);font-size:14px" onclick="if(confirm('+'\''+'Удалить?'+'\''+')){DD('+'\''+'/api/checkpoints/'+cp.id+'\''+').then(loadMeta)}">✕</button></div>'});if(!h)h='<div style="padding:16px;text-align:center;color:var(--tx3);font-size:11px">Нет точек</div>';$('cp-list').innerHTML=h}
function rCats(){var el=$('cat-list');if(!el)return;var h='';cats.forEach(function(c){h+='\n        <div class="cat-row">\n            <span style="color:'+c.color+'">'+c.name+'</span>\n            <button onclick="editCat(\''+c.id+'\')">✎</button>\n            <button onclick="if(confirm(\'Удалить?\'))DD(\'/api/categories/'+c.id+'\').then(loadMeta)">✕</button>\n        </div>'});el.innerHTML=h}

function rSet(){F('/api/status').then(function(st){var h='';h+='<div class="set-block"><h3>Шлюз</h3><div style="font-size:11px;color:var(--tx2);line-height:1.8">Статус: <b style="color:'+(st.gateway_connected?'var(--grn)':'var(--red)')+'">'+(st.gateway_connected?'Подключён':'Ошибка')+'</b><br>URL: '+st.gateway_url+'<br>Опросов: '+st.poll_count+' · Узлов: '+st.nodes_count+'<br>Точек трека: '+st.tracks_count+'<br>Тайлы: <b>'+(st.tiles_available?'Есть':'Нет')+'</b></div></div>';h+='<div class="set-block"><h3>Загрузка карты</h3><div class="fr"><div class="fg"><label>Широта центра</label><input id="td-lat" value="49.45"></div><div class="fg"><label>Долгота центра</label><input id="td-lon" value="11.08"></div></div><div class="fr"><div class="fg"><label>Радиус (км)</label><input id="td-rad" type="number" value="20"></div><div class="fg"><label>Зум (мин-макс)</label><input id="td-zoom" value="8-15"></div></div><button class="btn btn-a" style="margin-top:6px" onclick="startTileDL()">Скачать тайлы</button><div class="tile-progress" id="td-bar" style="display:none"><div class="tile-fill" id="td-fill"></div></div><div id="td-status" style="font-size:10px;color:var(--tx3);margin-top:4px"></div></div>';h+='<div class="set-block"><h3>Категории</h3><div id="cat-list"></div><div style="display:flex;gap:4px;margin-top:6px"><input id="s-cn" placeholder="Название" style="flex:1"><input id="s-cc" type="color" value="#f59e0b" style="width:40px;padding:3px"><button class="btn btn-a" style="width:auto;padding:6px 12px" onclick="addCat()">+</button></div></div>';$('rp-set').innerHTML=h;rCats()}).catch(function(){$('rp-set').innerHTML='<div style="color:var(--red);padding:16px">Нет связи</div>'})}
function startTileDL(){var lat=$('td-lat').value,lon=$('td-lon').value,rad=$('td-rad').value,zoom=$('td-zoom').value;$('td-bar').style.display='block';$('td-status').textContent='Запрос к серверу...';$('td-fill').style.width='0%';$('td-status').textContent='Запустите на сервере: python download_tiles.py --lat '+lat+' --lon '+lon+' --radius '+rad+' --zoom '+zoom;$('td-fill').style.width='100%';addLog('sys','Запрос загрузки тайлов: '+lat+','+lon+' r='+rad+'км z='+zoom)}
function addCat(){var n=$('s-cn').value.trim();if(!n)return;P('/api/categories',{name:n,color:$('s-cc').value}).then(loadMeta)}
function editCat(id){var c=catBy(id);if(!c)return;var n=prompt('Название категории',c.name);if(n===null)return;n=n.trim();if(!n)return;P('/api/categories',{id:c.id,name:n,color:c.color}).then(loadMeta)}

function openPF(pre){$('mp-i').value='-1';$('mp-dev').value=pre||'';$('mp-num').value='';$('mp-pil').value='';$('mp-nav').value='';$('mp-car').value='';$('mp-t').textContent='Новый экипаж';$('mp-del').style.display='none';fCS();$('m-p').classList.add('show')}
function editP(d){var p=partBy(d);if(!p)return;$('mp-i').value=p.dev_id;$('mp-dev').value=p.dev_id;$('mp-num').value=p.num;$('mp-pil').value=p.pilot;$('mp-nav').value=p.navigator;$('mp-car').value=p.car;$('mp-t').textContent='#'+p.num;$('mp-del').style.display='block';fCS();$('mp-cat').value=p.cat_id;$('m-p').classList.add('show')}
function fCS(){$('mp-cat').innerHTML=cats.map(function(c){return'<option value="'+c.id+'">'+c.name+'</option>'}).join('')}
function saveP(){var o={dev_id:+$('mp-dev').value,num:+$('mp-num').value,pilot:$('mp-pil').value.trim(),navigator:$('mp-nav').value.trim(),car:$('mp-car').value.trim(),cat_id:$('mp-cat').value};if(!o.dev_id||!o.num||!o.pilot)return;P('/api/participants',o).then(function(){closeM('m-p');loadMeta();addLog('sys','Экипаж #'+o.num+' сохранён')})}
function delP(){var d=+$('mp-i').value;if(d&&confirm('Удалить?'))DD('/api/participants/'+d).then(function(){closeM('m-p');loadMeta()})}

function openCF(){$('mc-id').value='';$('mc-t').textContent='Новая точка';$('mc-name').value='КТ-'+(cps.length+1);$('mc-lat').value='';$('mc-lon').value='';$('mc-rad').value='50';$('mc-type').value='cp';$('mc-del').style.display='none';fCC(null);$('m-c').classList.add('show')}
function editCP(id){var cp=cps.find(function(x){return x.id===id});if(!cp)return;$('mc-id').value=cp.id;$('mc-t').textContent='Редактировать';$('mc-name').value=cp.name;$('mc-lat').value=cp.lat;$('mc-lon').value=cp.lon;$('mc-rad').value=cpRadius(cp);$('mc-type').value=cp.cp_type;$('mc-del').style.display='block';fCC(cpCatIds(cp));$('m-c').classList.add('show')}
function fCC(sel){$('mc-cats').innerHTML=cats.map(function(c){var chk=sel?sel.indexOf(c.id)!==-1:true;return'<label style="display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px"><input type="checkbox" value="'+c.id+'"'+(chk?' checked':'')+'><span style="color:'+c.color+'">'+c.name+'</span></label>'}).join('')}
function saveC(){var ci=[];document.querySelectorAll('#mc-cats input:checked').forEach(function(b){ci.push(b.value)});var o={name:$('mc-name').value.trim(),lat:+$('mc-lat').value,lon:+$('mc-lon').value,radius:+$('mc-rad').value||50,cp_type:$('mc-type').value,points:0,cat_ids:ci};var id=$('mc-id').value;if(id)o.id=id;if(!o.name||isNaN(o.lat)||isNaN(o.lon))return;P('/api/checkpoints',o).then(function(){closeM('m-c');loadMeta();addLog('sys','Точка '+o.name+' сохранена')})}
function delC(){var id=$('mc-id').value;if(id&&confirm('Удалить?'))DD('/api/checkpoints/'+id).then(function(){closeM('m-c');loadMeta()})}

var gpxW=[];
function loadGPX(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){var d=new DOMParser().parseFromString(r.result,'text/xml');gpxW=[];d.querySelectorAll('wpt,rtept').forEach(function(w){var n=w.querySelector('name');gpxW.push({name:n?n.textContent:'КТ-'+(gpxW.length+1),lat:+w.getAttribute('lat'),lon:+w.getAttribute('lon')})});if(!gpxW.length){alert('Нет точек');return}gpxShow()};r.readAsText(f);e.target.value=''}
function gpxShow(){$('gpx-cnt').textContent=gpxW.length;$('gpx-list').innerHTML=gpxW.map(function(w){return'<div class="gpx-row"><span>'+w.name+'</span><span>'+w.lat.toFixed(5)+','+w.lon.toFixed(5)+'</span></div>'}).join('');$('gpx-cats').innerHTML=cats.map(function(c){return'<label style="display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px"><input type="checkbox" value="'+c.id+'" checked><span style="color:'+c.color+'">'+c.name+'</span></label>'}).join('');$('m-gpx').classList.add('show')}
function gpxGo(){var ci=[];document.querySelectorAll('#gpx-cats input:checked').forEach(function(b){ci.push(b.value)});var rad=+$('gpx-rad').value||50;Promise.all(gpxW.map(function(w){return P('/api/checkpoints',{name:w.name,lat:w.lat,lon:w.lon,radius:rad,cp_type:'cp',points:0,cat_ids:ci})})).then(function(){closeM('m-gpx');loadMeta();addLog('sys','Импортировано '+gpxW.length+' точек');if(gpxW.length){setTimeout(function(){map.fitBounds(L.latLngBounds(gpxW.map(function(w){return[w.lat,w.lon]})),{padding:[40,40]})},300)}})}

function closeM(id){$(id).classList.remove('show')}
function mTab(t){$('pnl-left').classList.remove('open');$('pnl-right').classList.remove('open');document.querySelectorAll('.mob-nav button').forEach(function(b){b.classList.remove('act')});if(t==='left')$('pnl-left').classList.add('open');if(t==='right')$('pnl-right').classList.add('open');$('mt-'+t).classList.add('act');if(t==='map')map.invalidateSize()}
setInterval(function(){var d=new Date();$('clk').textContent=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2)},1000);
$('clk').textContent=new Date().toLocaleTimeString();
addLog('sys','Dashboard загружен');
</script>
</body></html>
